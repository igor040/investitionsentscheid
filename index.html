<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>💰 Ultimate Investment System</title>

<style>

/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    transition: 0.3s;
}

.light {
    background: #f4f6f9;
    color: #222;
}

/* ================= HEADER ================= */
header {
    text-align: center;
    padding: 20px;
    font-size: 32px;
    font-weight: bold;
}

/* ================= NAV ================= */
nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

nav button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* ================= LAYOUT ================= */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

/* ================= CARD ================= */
.card {
    width: 360px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ================= INPUT ================= */
input, select {
    width: 95%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

/* ================= BUTTON ================= */
.btn {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    cursor: pointer;
    color: white;
}

.blue { background: #007bff; }
.green { background: #28a745; }
.gray { background: #6c757d; }
.red { background: #dc3545; }

.btn:hover {
    transform: scale(1.05);
}

/* ================= RESULT ================= */
#result {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

.success { background: #198754; }
.error { background: #842029; }

/* ================= PROGRESS ================= */
.progress {
    height: 10px;
    background: #ccc;
    border-radius: 5px;
}
.bar {
    height: 10px;
    width: 0%;
    background: #00ffcc;
}

/* ================= CHART ================= */
canvas {
    background: white;
    border-radius: 10px;
}

/* ================= HISTORY ================= */
.history-item {
    font-size: 13px;
    padding: 5px;
    border-bottom: 1px solid #aaa;
}

/* ================= ANIMATION ================= */
@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}

<body>

<header>💰 Ultimate Investment System</header>

<nav>
<button class="btn blue" onclick="showTab('main')">Berater</button>
<button class="btn green" onclick="showTab('chart')">Simulation</button>
<button class="btn gray" onclick="showTab('history')">History</button>
<button class="btn red" onclick="showTab('portfolio')">Portfolio</button>
<button class="btn" onclick="toggleMode()">🌙 Mode</button>
</nav>

<div class="container">

<!-- MAIN -->
<div class="card tab" id="main">
<h3>📋 Eingaben</h3>

<input id="amount" type="number" placeholder="Betrag €">

<select id="risk">
<option value="">Risiko</option>
<option value="low">Niedrig</option>
<option value="medium">Mittel</option>
<option value="high">Hoch</option>
</select>

<select id="duration">
<option value="">Dauer</option>
<option value="short">Kurz</option>
<option value="medium">Mittel</option>
<option value="long">Lang</option>
</select>

<select id="goal">
<option value="">Ziel</option>
<option value="security">Sicherheit</option>
<option value="growth">Wachstum</option>
<option value="fast">Schnell</option>
</select>

<button class="btn blue" onclick="recommend()">Empfehlung</button>
<button class="btn gray" onclick="resetForm()">Reset</button>
<button class="btn green" onclick="randomStrategy()">🎲 Zufall</button>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="result"></div>

</div>

<!-- PORTFOLIO -->
<div class="card tab" id="portfolio" style="display:none;">
<h3>📦 Portfolio Vorschlag</h3>
<div id="portfolioOutput">Noch keine Daten</div>
<button class="btn blue" onclick="generatePortfolio()">Generieren</button>
</div>

<!-- CHART -->
<div class="card tab" id="chart" style="display:none;">
<h3>📊 Simulation</h3>
<canvas id="canvas" width="300" height="200"></canvas>
<button class="btn green" onclick="drawChart()">Start</button>
</div>

<!-- HISTORY -->
<div class="card tab" id="history" style="display:none;">
<h3>📜 History</h3>
<div id="historyList"></div>
<button class="btn red" onclick="clearHistory()">Löschen</button>
</div>

</div>

<script>

/* ================= TAB ================= */
function showTab(id){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
document.getElementById(id).style.display="block";
}

/* ================= MODE ================= */
function toggleMode(){
document.body.classList.toggle("light");
}

/* ================= RECOMMEND ================= */
function recommend(){
let risk=document.getElementById("risk").value;
let result=document.getElementById("result");
let bar=document.getElementById("bar");

if(!risk){
result.style.display="block";
result.className="error";
result.innerHTML="Bitte alles auswählen!";
return;
}

let text="";
if(risk==="low"){text="Tagesgeld";bar.style.width="30%";}
if(risk==="medium"){text="ETF";bar.style.width="60%";}
if(risk==="high"){text="Aktien";bar.style.width="100%";}

result.style.display="block";
result.className="success";
result.innerHTML="Empfehlung: "+text;

/* Save */
let arr=JSON.parse(localStorage.getItem("hist")||"[]");
arr.push(text);
localStorage.setItem("hist",JSON.stringify(arr));
loadHistory();
}

/* ================= RESET ================= */
function resetForm(){
document.querySelectorAll("input,select").forEach(el=>el.value="");
document.getElementById("result").style.display="none";
document.getElementById("bar").style.width="0%";
}

/* ================= RANDOM ================= */
function randomStrategy(){
let r=["low","medium","high"];
document.getElementById("risk").value=r[Math.floor(Math.random()*3)];
recommend();
}

/* ================= PORTFOLIO ================= */
function generatePortfolio(){
let risk=document.getElementById("risk").value;
let out=document.getElementById("portfolioOutput");

if(risk==="low"){
out.innerHTML="70% Anleihen<br>30% Cash";
}
else if(risk==="medium"){
out.innerHTML="60% ETF<br>40% Anleihen";
}
else{
out.innerHTML="80% Aktien<br>20% Krypto";
}
}

/* ================= CHART ================= */
function drawChart(){
let c=document.getElementById("canvas");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,300,200);
ctx.beginPath();
ctx.moveTo(0,180);

for(let i=0;i<300;i+=20){
ctx.lineTo(i,180-Math.random()*150);
}
ctx.strokeStyle="lime";
ctx.stroke();
}

/* ================= HISTORY ================= */
function loadHistory(){
let list=document.getElementById("historyList");
list.innerHTML="";
let arr=JSON.parse(localStorage.getItem("hist")||"[]");
arr.forEach(e=>{
let d=document.createElement("div");
d.className="history-item";
d.innerText=e;
list.appendChild(d);
});
}

function clearHistory(){
localStorage.removeItem("hist");
loadHistory();
}

loadHistory();

</body>
</html>
