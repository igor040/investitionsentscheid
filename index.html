<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Investment App</title>
<style>
/* ===========================
  GLOBAL DESIGN
=========================== */
body {
   margin: 0;
   font-family: "Segoe UI", sans-serif;
   background: linear-gradient(135deg, #4facfe, #00f2fe);
   height: 100vh;
   display: flex;
   justify-content: center;
   align-items: center;
   overflow: hidden;
}
.hidden { display: none; }
.card {
   background: white;
   border-radius: 20px;
   padding: 25px;
   width: 360px;
   box-shadow: 0 20px 40px rgba(0,0,0,0.2);
   animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
   from { opacity: 0; transform: translateY(20px); }
   to { opacity: 1; transform: translateY(0); }
}
h2 {
   text-align: center;
}
/* ===========================
  INPUTS
=========================== */
input, select {
   width: 100%;
   padding: 10px;
   margin: 8px 0;
   border-radius: 10px;
   border: 1px solid #ccc;
   transition: 0.3s;
}
input:focus, select:focus {
   border-color: #4facfe;
   outline: none;
}
/* ===========================
  BUTTONS
=========================== */
button {
   width: 100%;
   padding: 12px;
   margin-top: 10px;
   border: none;
   border-radius: 10px;
   cursor: pointer;
   transition: 0.3s;
   font-weight: bold;
}
.btn-primary { background: #4facfe; color: white; }
.btn-secondary { background: #ccc; }
.btn-random { background: #ffb347; }
.btn-logout { background: #ff6b6b; color: white; }
button:hover {
   transform: scale(1.05);
}
/* ===========================
  RESULT BOX
=========================== */
.result {
   margin-top: 15px;
   padding: 15px;
   border-radius: 12px;
   background: #f1faff;
   display: none;
   animation: fadeIn 0.5s ease;
}
/* ===========================
  ERROR
=========================== */
.error {
   color: red;
   margin-top: 10px;
}
/* ===========================
  PROGRESS BAR
=========================== */
.progress {
   height: 8px;
   background: #ddd;
   border-radius: 10px;
   margin-top: 10px;
   overflow: hidden;
}
.progress-bar {
   height: 100%;
   width: 0%;
   background: #4facfe;
   transition: width 0.5s;
}
/* ===========================
  NAVBAR
=========================== */
.navbar {
   display: flex;
   justify-content: space-between;
   margin-bottom: 10px;
}
/* ===========================
  ANIMATION SPARKLE
=========================== */
.sparkle {
   position: absolute;
   width: 10px;
   height: 10px;
   background: white;
   border-radius: 50%;
   animation: sparkleAnim 2s infinite;
}
@keyframes sparkleAnim {
   0% { opacity: 1; transform: translateY(0); }
   100% { opacity: 0; transform: translateY(-100px); }
}
</style>
</head>
<body>
<!-- ===========================
LOGIN SCREEN
=========================== -->
<div class="card" id="loginScreen">
<h2>🔐 Login</h2>
<input type="text" id="username" placeholder="Benutzername">
<input type="password" id="password" placeholder="Passwort">
<button class="btn-primary" onclick="login()">Login</button>
<button class="btn-secondary" onclick="register()">Registrieren</button>
<div class="error" id="loginError"></div>
</div>
<!-- ===========================
DASHBOARD
=========================== -->
<div class="card hidden" id="appScreen">
<div class="navbar">
<strong id="welcome"></strong>
<button class="btn-logout" onclick="logout()">Logout</button>
</div>
<h2>💰 Investment Pro</h2>
<input type="number" id="amount" placeholder="Anlagebetrag (€)">
<select id="risk">
<option value="">Risiko</option>
<option>niedrig</option>
<option>mittel</option>
<option>hoch</option>
</select>
<select id="horizon">
<option value="">Horizont</option>
<option>kurz</option>
<option>mittel</option>
<option>lang</option>
</select>
<select id="goal">
<option value="">Ziel</option>
<option>Sicherheit</option>
<option>Wachstum</option>
<option>schnelles Geld</option>
</select>
<button class="btn-primary" onclick="calculate()">📊 Empfehlung</button>
<button class="btn-random" onclick="randomStrategy()">🎲 Zufällig</button>
<button class="btn-secondary" onclick="resetForm()">Reset</button>
<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>
<div class="error" id="error"></div>
<div class="result" id="result"></div>
</div>
<script>
/* ===========================
USER SYSTEM (LOCAL STORAGE)
=========================== */
function register() {
   let user = document.getElementById("username").value;
   let pass = document.getElementById("password").value;
   if (!user || !pass) {
       showError("loginError", "Bitte alles ausfüllen!");
       return;
   }
   localStorage.setItem("user_" + user, pass);
   showError("loginError", "Registriert! Jetzt einloggen.");
}
function login() {
   let user = document.getElementById("username").value;
   let pass = document.getElementById("password").value;
   let stored = localStorage.getItem("user_" + user);
   if (stored === pass) {
       localStorage.setItem("currentUser", user);
       showApp();
   } else {
       showError("loginError", "Falsche Daten!");
   }
}
function logout() {
   localStorage.removeItem("currentUser");
   location.reload();
}
function showApp() {
   document.getElementById("loginScreen").classList.add("hidden");
   document.getElementById("appScreen").classList.remove("hidden");
   let user = localStorage.getItem("currentUser");
   document.getElementById("welcome").innerText = "👋 " + user;
}
/* ===========================
HELPER
=========================== */
function showError(id, msg) {
   document.getElementById(id).innerText = msg;
}
/* ===========================
CORE LOGIC
=========================== */
function calculate() {
   let amount = document.getElementById("amount").value;
   let risk = document.getElementById("risk").value;
   let horizon = document.getElementById("horizon").value;
   let goal = document.getElementById("goal").value;
   let result = document.getElementById("result");
   let error = document.getElementById("error");
   let progress = document.getElementById("progress");
   error.innerText = "";
   result.style.display = "none";
   if (!amount || !risk || !horizon || !goal) {
       error.innerText = "⚠️ Bitte alles ausfüllen!";
       return;
   }
   progress.style.width = "100%";
   let strategy = "";
   let reason = "";
   if (risk === "niedrig") {
       strategy = "💼 Tagesgeld / Staatsanleihen";
       reason = "Sehr sicher, ideal für Stabilität.";
   }
   if (risk === "mittel") {
       strategy = "📊 ETFs (z.B. MSCI World)";
       reason = "Gute Mischung aus Risiko & Rendite.";
   }
   if (risk === "hoch") {
       strategy = "🚀 Aktien / Krypto";
       reason = "Hohe Gewinne möglich, aber riskant.";
   }
   if (goal === "Wachstum") {
       strategy += " + Wachstum ETFs";
   }
   if (horizon === "lang") {
       strategy += " (Langfristig optimiert)";
   }
   result.innerHTML = `
<h3>${strategy}</h3>
<p>${reason}</p>
<small>Betrag: €${amount}</small>
   `;
   result.style.display = "block";
   createSparkles();
}
/* ===========================
RANDOM
=========================== */
function randomStrategy() {
   let risks = ["niedrig", "mittel", "hoch"];
   let horizons = ["kurz", "mittel", "lang"];
   let goals = ["Sicherheit", "Wachstum", "schnelles Geld"];
   document.getElementById("risk").value = risks[Math.floor(Math.random()*3)];
   document.getElementById("horizon").value = horizons[Math.floor(Math.random()*3)];
   document.getElementById("goal").value = goals[Math.floor(Math.random()*3)];
}
/* ===========================
RESET
=========================== */
function resetForm() {
   document.getElementById("amount").value = "";
   document.getElementById("risk").value = "";
   document.getElementById("horizon").value = "";
   document.getElementById("goal").value = "";
   document.getElementById("result").style.display = "none";
   document.getElementById("progress").style.width = "0%";
}
/* ===========================
VISUAL EFFECTS
=========================== */
function createSparkles() {
   for (let i = 0; i < 10; i++) {
       let s = document.createElement("div");
       s.className = "sparkle";
       s.style.left = Math.random()*100 + "%";
       s.style.top = "80%";
       document.body.appendChild(s);
       setTimeout(() => s.remove(), 2000);
   }
}
/* ===========================
AUTO LOGIN
=========================== */
window.onload = () => {
   let user = localStorage.getItem("currentUser");
   if (user) showApp();
};
</script>
</body>
</html>
